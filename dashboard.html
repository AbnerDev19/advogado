<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão | Vitor Rocha Advocacia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard-style.css">
</head>
<body class="dashboard-body">
    <header class="admin-header">
        <div class="admin-header-container">
            <div class="brand">
                <span class="brand-monogram">VR</span>
                <span class="brand-text">
                    <strong>Gestão Interna</strong>
                    <small>Painel de Atendimento</small>
                </span>
            </div>
            <div class="admin-actions">
                <span class="admin-user">Dr. Vitor Rocha</span>
                <a href="login.html" class="btn btn-sm btn-secondary">Sair</a>
            </div>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="dashboard-container">
            
            <div class="tabs-nav">
                <button class="tab-btn active" data-target="tab-contatos">Gestão de Contatos</button>
                <button class="tab-btn" data-target="tab-noticias">Conteúdo e Notícias</button>
            </div>

            <div id="tab-contatos" class="tab-pane active">
                <header class="dashboard-page-header">
                    <h2>Gerenciamento de Contatos</h2>
                    <div class="dashboard-filters">
                        <button class="filter-btn active" data-filter="all">Todos</button>
                        <button class="filter-btn" data-filter="novo_contato">Novos</button>
                        <button class="filter-btn" data-filter="em_andamento">Em Andamento</button>
                        <button class="filter-btn" data-filter="concluido">Concluídos</button>
                    </div>
                </header>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-title">Novos Contatos</span>
                        <strong class="stat-value" id="count-novos">0</strong>
                    </div>
                    <div class="stat-card">
                        <span class="stat-title">Em Andamento</span>
                        <strong class="stat-value" id="count-andamento">0</strong>
                    </div>
                    <div class="stat-card">
                        <span class="stat-title">Total Cadastrado</span>
                        <strong class="stat-value" id="count-total">0</strong>
                    </div>
                </div>

                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Nome</th>
                                <th>Contato</th>
                                <th>Motivo</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="leads-table-body">
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="tab-noticias" class="tab-pane">
                <header class="dashboard-page-header">
                    <h2>Publicar Novo Conteúdo</h2>
                </header>

                <div class="admin-form-container">
                    <form id="news-form" class="admin-form">
                        <div class="form-row">
                            <div class="form-group" style="flex: 2;">
                                <label for="news-title">Título da Publicação</label>
                                <input type="text" id="news-title" placeholder="Ex: O valor da prevenção jurídica..." required>
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label for="news-category">Categoria</label>
                                <select id="news-category" required>
                                    <option value="Empresarial">Empresarial</option>
                                    <option value="Patrimonial">Patrimonial</option>
                                    <option value="Contratos">Contratos</option>
                                    <option value="Institucional">Institucional</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="news-excerpt">Resumo da Notícia</label>
                            <textarea id="news-excerpt" rows="3" placeholder="Insira o texto descritivo que aparecerá no card..." required></textarea>
                        </div>
                        <div class="form-actions-right">
                            <button type="submit" class="btn btn-primary">Publicar Artigo</button>
                        </div>
                    </form>
                </div>

                <header class="dashboard-page-header" style="margin-top: 48px;">
                    <h2>Conteúdos Publicados</h2>
                </header>
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Categoria</th>
                                <th>Título</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="news-table-body">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detalhes da Solicitação</h3>
                <button class="close-btn" id="close-modal" aria-label="Fechar">&times;</button>
            </div>
            <div class="modal-body" id="modal-body-content">
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="btn-close-modal-footer">Fechar Painel</button>
            </div>
        </div>
    </div>

    <script src="js/dashboard-script.js"></script>
</body>
</html>
