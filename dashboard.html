<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão | Vitor Rocha Advocacia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard-style.css">
</head>
<body class="dashboard-body">
    <header class="admin-header">
        <div class="admin-header-container">
            <div class="brand">
                <span class="brand-monogram">VR</span>
                <span class="brand-text">
                    <strong>Gestão Interna</strong>
                    <small>Painel de Atendimento</small>
                </span>
            </div>
            <div class="admin-actions">
                <span class="admin-user">Dr. Vitor Rocha</span>
                <a href="login.html" class="btn btn-sm btn-secondary">Sair</a>
            </div>
        </div>
        <nav class="dashboard-nav">
            <div class="nav-container">
                <button class="nav-tab active" onclick="switchTab('contatos')">Solicitações de Contato</button>
                <button class="nav-tab" onclick="switchTab('noticias')">Publicações e Notícias</button>
            </div>
        </nav>
    </header>

    <main class="dashboard-main">
        <div class="dashboard-container">
            
            <div id="tab-contatos" class="tab-content active">
                <header class="dashboard-page-header">
                    <h2>Gerenciamento de Contatos</h2>
                    <div class="dashboard-filters">
                        <button class="filter-btn active" data-filter="all">Todos</button>
                        <button class="filter-btn" data-filter="novo_contato">Novos</button>
                        <button class="filter-btn" data-filter="em_andamento">Em Andamento</button>
                        <button class="filter-btn" data-filter="concluido">Concluídos</button>
                    </div>
                </header>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-title">Novos Contatos</span>
                        <strong class="stat-value" id="count-novos">0</strong>
                    </div>
                    <div class="stat-card">
                        <span class="stat-title">Em Andamento</span>
                        <strong class="stat-value" id="count-andamento">0</strong>
                    </div>
                    <div class="stat-card">
                        <span class="stat-title">Total Cadastrado</span>
                        <strong class="stat-value" id="count-total">0</strong>
                    </div>
                </div>

                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Nome</th>
                                <th>Contato</th>
                                <th>Motivo</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="leads-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-noticias" class="tab-content">
                <header class="dashboard-page-header">
                    <h2>Gerenciamento de Notícias</h2>
                    <button class="btn btn-primary" onclick="openNewsModal()">+ Nova Notícia</button>
                </header>

                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Título</th>
                                <th>Categoria</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="news-table-body"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detalhes da Solicitação</h3>
                <button class="close-btn" onclick="closeModal('details-modal')" aria-label="Fechar">&times;</button>
            </div>
            <div class="modal-body" id="modal-body-content"></div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="closeModal('details-modal')">Fechar Painel</button>
            </div>
        </div>
    </div>

    <div id="news-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="news-modal-title">Nova Notícia</h3>
                <button class="close-btn" onclick="closeModal('news-modal')" aria-label="Fechar">&times;</button>
            </div>
            <form id="news-form" onsubmit="saveNews(event)">
                <div class="modal-body">
                    <input type="hidden" id="news-id">
                    
                    <div class="form-group">
                        <label>Título da Notícia</label>
                        <input type="text" id="news-title" class="form-control" required placeholder="Ex: Nova lei trabalhista aprovada">
                    </div>

                    <div class="form-group-row">
                        <div class="form-group">
                            <label>Categoria</label>
                            <select id="news-category" class="form-control" required>
                                <option value="Direito Empresarial">Direito Empresarial</option>
                                <option value="Direito Civil">Direito Civil</option>
                                <option value="Direito Trabalhista">Direito Trabalhista</option>
                                <option value="Informativo">Informativo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="news-status" class="form-control" required>
                                <option value="Publicado">Publicado</option>
                                <option value="Rascunho">Rascunho</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Conteúdo</label>
                        <textarea id="news-content" class="form-control" rows="6" required placeholder="Digite o conteúdo da publicação..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('news-modal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Notícia</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dashboard-script.js"></script>
</body>
</html>
